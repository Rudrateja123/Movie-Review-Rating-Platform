<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Review & Rating Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/favicons/favicon1.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header>
            <h1>Movie Finder</h1>
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Search for a movie..." autocomplete="off">
                <button type="submit">Search</button>
            </form>
        </header>
    
        <main id="movie-container">
            </main>
    </div>
    
    <div id="modal-container" class="modal-container">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
